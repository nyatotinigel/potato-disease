services:
  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: potato-api
    ports:
      - "8000:8000"
    environment:
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost,http://127.0.0.1:3000,http://frontend:3000
      - MODEL_PATH=/app/saved_models/2/potato_disease_detection.keras
    volumes:
      - ./potato_disease/saved_models:/app/saved_models:ro
    networks:
      - potato-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 8000), timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Web Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: potato-web
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000/predict
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - potato-network
    restart: unless-stopped

networks:
  potato-network:
    driver: bridge

volumes:
  models:
    driver: local
